<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor Simplista</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <span>Corretor Dinâmico</span>
        <button id="theme-toggle" aria-label="Alternar tema">
            <svg id="icon-moon" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            <svg id="icon-sun" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><circle cx="12" cy="12" r="5"></circle><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path></svg>
        </button>
    </header>

    <div class="grid">
        <div><h3>dicionário</h3><textarea id="dict" placeholder="palavras..."></textarea></div>
        <div>
            <h3>texto</h3>
            <div class="editor-wrapper">
                <div id="backdrop"></div>
                <textarea id="editor" spellcheck="false" placeholder="digite..."></textarea>
            </div>
        </div>
    </div>

    <div id="results"><div id="suggestions"></div></div>
    
    <div id="dp-view" style="display: none;">
        <button onclick="document.getElementById('dp-view').style.display='none'" style="margin-bottom: 10px;">[ fechar matriz ]</button>
        <div id="dp-table-container"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
