<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor com Corretor DP</title>
<style>
  :root { --bg: #ffffff; --text: #1a1a1a; --border: #ccc; --bg-panel: #f9f9f9; --highlight: #e0e0e0; }
  [data-theme="dark"] { --bg: #121212; --text: #e0e0e0; --border: #444; --bg-panel: #1e1e1e; --highlight: #333; }
  body { background-color: var(--bg); color: var(--text); font-family: system-ui, sans-serif; margin: 0; padding: 20px; transition: background-color 0.3s, color 0.3s; }
  header { display: flex; justify-content: space-between; margin-bottom: 20px; }
  .container { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
  textarea { width: 100%; height: 300px; background-color: var(--bg-panel); color: var(--text); border: 1px solid var(--border); padding: 10px; resize: vertical; box-sizing: border-box; }
  #results, #dp-view { margin-top: 20px; padding: 15px; background-color: var(--bg-panel); border: 1px solid var(--border); }
  table { border-collapse: collapse; margin-top: 10px; }
  th, td { border: 1px solid var(--border); padding: 5px 10px; text-align: center; }
  th { background-color: var(--highlight); }
  button { background-color: var(--highlight); color: var(--text); border: 1px solid var(--border); padding: 5px 10px; cursor: pointer; }
  .suggestion-item { margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
</style>
</head>
<body>

<header>
  <h2>Editor Corretor</h2>
  <button id="theme-toggle">Alternar Tema</button>
</header>

<div class="container">
  <div>
    <h3>Dicionário</h3>
    <textarea id="dict" placeholder="Insira as palavras aqui, separadas por quebra de linha."></textarea>
  </div>
  <div>
    <h3>Editor</h3>
    <textarea id="editor" placeholder="Digite seu texto..."></textarea>
  </div>
</div>

<div id="results">
  <h3>Análise de Similaridade</h3>
  <div id="suggestions">Nenhuma palavra incorreta detectada.</div>
</div>

<div id="dp-view" style="display: none;">
  <h3>Tabela DP (Distância de Levenshtein)</h3>
  <button onclick="document.getElementById('dp-view').style.display='none'">Fechar</button>
  <div id="dp-table-container"></div>
</div>

<script type="module">
  import { levenshtein, calculateSimilarity } from './dp.js';

  window.renderDpTable = function(s1, s2) {
    const matrix = levenshtein(s1, s2);
    let html = '<table><tr><th></th><th>ε</th>';
    
    for (let char of s2) html += `<th>${char}</th>`;
    html += '</tr>';
    
    for (let i = 0; i <= s1.length; i++) {
      html += `<tr><th>${i === 0 ? 'ε' : s1[i-1]}</th>`;
      for (let j = 0; j <= s2.length; j++) {
        html += `<td>${matrix[i][j]}</td>`;
      }
      html += '</tr>';
    }
    html += '</table>';
    
    document.getElementById('dp-table-container').innerHTML = html;
    document.getElementById('dp-view').style.display = 'block';
  };

  function analyzeText() {
    const dictEl = document.getElementById('dict');
    const editorEl = document.getElementById('editor');
    if (!dictEl || !editorEl) return;

    const dictText = dictEl.value.toLowerCase();
    const dictionary = new Set(dictText.split(/\s+/).filter(w => w.length > 0));
    
    const editorText = editorEl.value.toLowerCase();
    const words = editorText.match(/\b[a-záàâãéèêíïóôõöúçñ]+\b/gi) || [];
    
    const suggestionsDiv = document.getElementById('suggestions');
    if (!suggestionsDiv) return;

    suggestionsDiv.innerHTML = '';
    
    let hasErrors = false;
    const uniqueWords = [...new Set(words)];

    uniqueWords.forEach(word => {
      if (!dictionary.has(word) && dictionary.size > 0) {
        hasErrors = true;
        let bestMatch = '';
        let bestSim = 0;
        
        dictionary.forEach(dictWord => {
          const matrix = levenshtein(word, dictWord);
          const distance = matrix[word.length][dictWord.length];
          const sim = parseFloat(calculateSimilarity(distance, word, dictWord));
          
          if (sim > bestSim) {
            bestSim = sim;
            bestMatch = dictWord;
          }
        });

        const item = document.createElement('div');
        item.className = 'suggestion-item';
        item.innerHTML = `
          <strong>${word}</strong> ➔ <em>${bestMatch}</em> (${bestSim}% de similaridade) 
          <button onclick="window.renderDpTable('${word}', '${bestMatch}')">Ver Tabela DP</button>
        `;
        suggestionsDiv.appendChild(item);
      }
    });

    if (!hasErrors) {
      suggestionsDiv.innerHTML = 'Nenhuma palavra incorreta detectada.';
    }
  }

  const dictEl = document.getElementById('dict');
  const editorEl = document.getElementById('editor');
  const themeToggleEl = document.getElementById('theme-toggle');

  if (dictEl) {
    dictEl.addEventListener('input', analyzeText);
  }

  if (editorEl) {
    let timeout = null;
    editorEl.addEventListener('input', () => {
      clearTimeout(timeout);
      timeout = setTimeout(analyzeText, 500);
    });
  }

  if (themeToggleEl) {
    themeToggleEl.addEventListener('click', () => {
      const isDark = document.body.getAttribute('data-theme') === 'dark';
      document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
    });
  }
</script>
</body>
</html>
