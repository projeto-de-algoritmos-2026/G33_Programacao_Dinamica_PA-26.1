<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor Simplista</title>
    <style>
        :root,
        [data-theme="dark"] {
            --bg: #323437;
            --txt: #d1d0c5;
            --muted: #646669;
            --err: #ca4754;
            --border: #4a4c50;
        }

        [data-theme="light"] {
            --bg: #f5f5f5;
            --txt: #333333;
            --muted: #999999;
            --err: #d32f2f;
            --border: #cccccc;
        }

        body {
            background: var(--bg);
            color: var(--txt);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 5vh 10vw;
            font-size: 1.2rem;
            transition: background 0.2s, color 0.2s;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--muted);
            margin-bottom: 40px;
        }

        button {
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            padding: 5px;
        }

        button:hover {
            color: var(--txt);
        }

        svg {
            pointer-events: none;
        }

        /* Controle do tema nativo via CSS */
        #icon-moon {
            display: none;
        }

        [data-theme="light"] #icon-sun {
            display: none;
        }

        [data-theme="light"] #icon-moon {
            display: block;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        h3 {
            color: var(--muted);
            font-weight: normal;
            font-size: 1rem;
            margin: 0 0 10px 0;
        }

        #dict {
            width: 100%;
            height: 40vh;
            background: transparent;
            color: var(--txt);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 15px;
            outline: none;
            resize: vertical;
            font: inherit;
            font-size: 1.5rem;
            box-sizing: border-box;
        }

        .editor-wrapper {
            position: relative;
            width: 100%;
            height: 40vh;
        }

        #editor,
        #backdrop {
            position: absolute;
            inset: 0;
            padding: 15px;
            border: 1px solid var(--border);
            border-radius: 4px;
            box-sizing: border-box;
            font: inherit;
            font-size: 1.5rem;
            line-height: 2.5;
            white-space: pre-wrap;
            word-break: break-word;
            overflow-y: auto;
            margin: 0;
        }

        #editor {
            color: transparent;
            background: transparent;
            caret-color: var(--txt);
            z-index: 2;
            outline: none;
            resize: none;
        }

        #backdrop {
            color: var(--txt);
            background: transparent;
            z-index: 1;
            border-color: transparent;
        }

        .err-inline {
            position: relative;
            color: var(--err);
        }

        .err-inline::after {
            content: attr(data-sug);
            position: absolute;
            left: 0;
            top: 1.3em;
            font-size: 0.7rem;
            color: var(--muted);
            white-space: nowrap;
            pointer-events: none;
        }

        #results,
        #dp-view {
            margin-top: 40px;
        }

        .correction-line {
            display: flex;
            gap: 15px;
            align-items: baseline;
            margin-bottom: 10px;
            padding: 5px 0;
            border-bottom: 1px dashed var(--border);
        }

        .err-word {
            color: var(--err);
            text-decoration: line-through;
        }

        .sug-word {
            color: var(--txt);
        }

        .meta {
            color: var(--muted);
            font-size: 0.9rem;
        }

        #dp-table-container {
            overflow-x: auto;
        }

        table {
            border-collapse: collapse;
            margin-top: 15px;
            width: 100%;
        }

        th,
        td {
            border: 1px solid var(--border);
            padding: 5px 15px;
            text-align: center;
            color: var(--muted);
        }

        th {
            color: var(--txt);
            font-weight: normal;
        }

        .path-cell {
            background-color: var(--txt);
            color: var(--bg);
            font-weight: bold;
        }

        .ops-container {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px dashed var(--border);
        }

        .ops-container h4 {
            margin: 0 0 10px 0;
            color: var(--txt);
            font-weight: normal;
        }

        .ops-list {
            margin: 0;
            padding-left: 20px;
            color: var(--muted);
            font-size: 1rem;
        }
    </style>
</head>

<body>

    <header>
        <span>Corretor Autom찼tico</span>
        <button id="theme-toggle" aria-label="Alternar tema">
            <svg id="icon-moon" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2"
                fill="none">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
            <svg id="icon-sun" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2"
                fill="none">
                <circle cx="12" cy="12" r="5"></circle>
                <path
                    d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42">
                </path>
            </svg>
        </button>
    </header>

    <div class="grid">
        <div>
            <h3>dicion찼rio</h3>
            <textarea id="dict" placeholder="palavras..."></textarea>
        </div>
        <div>
            <h3>texto</h3>
            <div class="editor-wrapper">
                <div id="backdrop"></div>
                <textarea id="editor" spellcheck="false" placeholder="digite..."></textarea>
            </div>
        </div>
    </div>

    <div id="results">
        <div id="suggestions"></div>
    </div>

    <div id="dp-view" style="display: none;">
        <button onclick="document.getElementById('dp-view').style.display='none'" style="margin-bottom: 10px;">[ fechar
            matriz ]</button>
        <div id="dp-table-container"></div>
    </div>

    <script>
        const $ = id => document.getElementById(id);
        const [dict, editor, backdrop, sug, dpView, dpContainer, themeBtn] =
            ['dict', 'editor', 'backdrop', 'suggestions', 'dp-view', 'dp-table-container', 'theme-toggle'].map($);

        function levenshtein(a, b) {
            const m = Array.from({ length: a.length + 1 }, (_, i) => [i]);
            for (let j = 0; j <= b.length; j++) m[0][j] = j;
            for (let i = 1; i <= a.length; i++) {
                for (let j = 1; j <= b.length; j++) {
                    m[i][j] = a[i - 1] === b[j - 1] ? m[i - 1][j - 1] : Math.min(m[i - 1][j - 1], m[i][j - 1], m[i - 1][j]) + 1;
                }
            }
            return m;
        }

        function getTraceback(m, a, b) {
            let i = a.length, j = b.length, path = new Set([`${i},${j}`]), ops = [];
            while (i > 0 || j > 0) {
                if (i > 0 && j > 0 && a[i - 1] === b[j - 1]) { ops.push(`Manter '${a[--i]}'`); j--; }
                else if (i > 0 && j > 0 && m[i][j] === m[i - 1][j - 1] + 1) ops.push(`Substituir '${a[--i]}' por '${b[--j]}'`);
                else if (i > 0 && m[i][j] === m[i - 1][j] + 1) ops.push(`Deletar '${a[--i]}'`);
                else ops.push(`Inserir '${b[--j]}'`);
                path.add(`${i},${j}`);
            }
            return { path, ops: ops.reverse() };
        }

        const calcSim = (d, max) => max ? ((1 - d / max) * 100).toFixed(2) : 100;

        window.renderDpTable = (a, b) => {
            const m = levenshtein(a, b), { path, ops } = getTraceback(m, a, b);
            let html = `<table><tr><th></th><th>琯</th>${[...b].map(c => `<th>${c}</th>`).join('')}</tr>`;

            for (let i = 0; i <= a.length; i++) {
                html += `<tr><th>${i ? a[i - 1] : '琯'}</th>` +
                    m[i].map((v, j) => `<td${path.has(`${i},${j}`) ? ' class="path-cell"' : ''}>${v}</td>`).join('') + `</tr>`;
            }

            dpContainer.innerHTML = html + `</table>
                <div class="ops-container"><h4>caminho 처timo:</h4><ul class="ops-list">
                ${ops.map(o => `<li>${o}</li>`).join('')}</ul></div>`;
            dpView.style.display = 'block';
        };

        let errCache = {}, timeout;

        function analyzeText() {
            const dictSet = new Set(dict.value.toLowerCase().match(/\S+/g) || []);
            const edTxt = editor.value, words = edTxt.match(/\b[a-z찼횪창찾챕챔챗챠챦처척천철첬챌챰]+\b/gi) || [];
            const errs = {};

            if (dictSet.size) {
                [...new Set(words.map(w => w.toLowerCase()))].forEach(w => {
                    if (!dictSet.has(w)) {
                        if (!errCache[w]) {
                            let bestMatch = '', bestSim = -1;
                            dictSet.forEach(dw => {
                                const sim = +calcSim(levenshtein(w, dw)[w.length][dw.length], Math.max(w.length, dw.length));
                                if (sim > bestSim) [bestSim, bestMatch] = [sim, dw];
                            });
                            errCache[w] = { bestMatch, bestSim };
                        }
                        errs[w] = errCache[w];
                    }
                });
            }

            backdrop.innerHTML = edTxt
                .replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', '\'': '&#39;' }[m]))
                .replace(/\b[a-z찼횪창찾챕챔챗챠챦처척천철첬챌챰]+\b/gi, m => errs[m.toLowerCase()]
                    ? `<span class="err-inline" data-sug="${errs[m.toLowerCase()].bestMatch}">${m}</span>` : m)
                + (edTxt.endsWith('\n') ? ' ' : '');

            sug.innerHTML = Object.entries(errs).map(([ew, { bestMatch, bestSim }]) => `
                <div class="correction-line">
                    <span class="err-word">${ew}</span><span class="sug-word">${bestMatch}</span><span class="meta">${bestSim}%</span>
                    <button onclick="window.renderDpTable('${ew}', '${bestMatch}')">[matriz]</button>
                </div>
            `).join('');
        }

        dict.addEventListener('input', () => { errCache = {}; analyzeText(); });
        editor.addEventListener('input', () => { clearTimeout(timeout); timeout = setTimeout(analyzeText, 100); });
        editor.addEventListener('scroll', () => backdrop.scrollTop = editor.scrollTop);

        themeBtn.addEventListener('click', () => {
            const root = document.documentElement;
            root.dataset.theme = root.dataset.theme === 'dark' ? 'light' : 'dark';
        });
    </script>
</body>

</html>
